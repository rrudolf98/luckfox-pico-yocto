# Enable MMC/eMMC support — the rv1106_defconfig does not include MMC.
# Without this, the kernel cannot access /dev/mmcblk0 for the root filesystem.
CONFIG_MMC=y
CONFIG_MMC_BLOCK=y
CONFIG_MMC_BLOCK_MINORS=32
CONFIG_MMC_DW=y
CONFIG_MMC_DW_PLTFM=y
CONFIG_MMC_DW_ROCKCHIP=y

# Enable MBR partition table support — needed to find mmcblk0p1/p2
CONFIG_MSDOS_PARTITION=y

# systemd requires cgroups, autofs, inotify, signalfd, timerfd, epoll, etc.
CONFIG_CGROUPS=y
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CPUSETS=y
CONFIG_MEMCG=y
CONFIG_CGROUP_BPF=y
CONFIG_AUTOFS_FS=y
CONFIG_INOTIFY_USER=y
CONFIG_SIGNALFD=y
CONFIG_TIMERFD=y
CONFIG_EPOLL=y
CONFIG_FHANDLE=y

# Ethernet PHY driver — Luckfox Pico Ultra W uses integrated RK630 PHY
CONFIG_REALTEK_PHY=y

# FAT/VFAT filesystem — needed to mount /boot partition (mmcblk0p1)
CONFIG_VFAT_FS=y
CONFIG_FAT_FS=y
CONFIG_NLS_CODEPAGE_437=y
CONFIG_NLS_ISO8859_1=y

# Thermal framework — silences RK630 PHY "failed to read out thermal zone" spam
CONFIG_THERMAL=y
CONFIG_THERMAL_OF=y

# USB 2.0 OTG — DWC3 controller + PHY
CONFIG_USB_SUPPORT=y
CONFIG_USB=y
CONFIG_USB_DWC3=y
CONFIG_USB_DWC3_GENERIC=y
CONFIG_USB_GADGET=y
CONFIG_SCSI=y
CONFIG_BLK_DEV_SD=y
CONFIG_USB_STORAGE=y
CONFIG_USB_MASS_STORAGE=y
CONFIG_EXTCON=y
CONFIG_PHY_ROCKCHIP_INNO_USB2=y
CONFIG_USB_EHCI_HCD=y
CONFIG_USB_OHCI_HCD=y
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_ETH=m
CONFIG_USB_G_SERIAL=m

# SPI bus
CONFIG_SPI=y
CONFIG_SPI_ROCKCHIP=y

# RTC — RV1106 built-in real-time clock
CONFIG_RTC_DRV_ROCKCHIP=y

# DMA heap — Rockchip heaps only (standard DMABUF_HEAPS_SYSTEM breaks RKNPU model loading)
CONFIG_DMABUF_HEAPS=y
CONFIG_DMABUF_HEAPS_ROCKCHIP=y
CONFIG_DMABUF_HEAPS_ROCKCHIP_CMA_HEAP=y

# Display — DRM + Rockchip VOP + RGB + simple panel
CONFIG_DRM=y
CONFIG_DRM_ROCKCHIP=y
CONFIG_ROCKCHIP_VOP=y
CONFIG_ROCKCHIP_RGB=y
CONFIG_DRM_PANEL_SIMPLE=y
CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_BACKLIGHT_PWM=y
CONFIG_DRM_FBDEV_EMULATION=y
CONFIG_FB=y
CONFIG_FB_CFB_FILLRECT=y
CONFIG_FB_CFB_COPYAREA=y
CONFIG_FB_CFB_IMAGEBLIT=y
# Framebuffer console + boot logo — required for the kernel to actually
# draw pixels into the DRM framebuffer. Without LOGO+fbcon, VOP scans an
# all-zero buffer and the panel shows black (indistinguishable from blank).
# Matches stock's luckfox_rv1106_linux_defconfig.
CONFIG_VT=y
CONFIG_VT_CONSOLE=y
CONFIG_FRAMEBUFFER_CONSOLE=y
CONFIG_LOGO=y
CONFIG_LOGO_LINUX_CLUT224=y

# POSIX file locks. Disabled in the upstream Luckfox SDK defconfig
# (tiny-kernel optimization) but required by anything that uses
# fcntl(F_SETLKW) — which includes PID-file locking in avahi-daemon
# and most long-running system daemons. Without this, every
# `fcntl(F_SETLKW)` returns EACCES, avahi-daemon fails to write its
# PID file, exits 255, and luckfox-pico.local never resolves.
CONFIG_FILE_LOCKING=y

# Touchscreen — the dtsi defines a Goodix GT911 on I2C3. Full chain:
# the input core (INPUT), the evdev interface (INPUT_EVDEV, needed
# for /dev/input/eventN to appear), the touchscreen subsystem, and
# the actual Goodix driver. Without INPUT_EVDEV, /dev/input/ doesn't
# exist at all even though the driver binds, because nothing creates
# the character device userspace consumers read.
CONFIG_INPUT=y
CONFIG_INPUT_EVDEV=y
CONFIG_INPUT_TOUCHSCREEN=y
CONFIG_TOUCHSCREEN_GOODIX=y

# LED subsystem — the dtsi defines a single gpio-led ("work" on
# GPIO3_C6). Without LEDS_CLASS+LEDS_GPIO the DT node is parsed but
# /sys/class/leds/ doesn't exist and the LED stays in whatever state
# the bootloader left it. Add the heartbeat trigger so the LED can
# blink as a "system alive" indicator and the timer trigger so the
# webserver can drive it from userspace via /sys/class/leds/work/.
CONFIG_NEW_LEDS=y
CONFIG_LEDS_CLASS=y
CONFIG_LEDS_GPIO=y
CONFIG_LEDS_TRIGGERS=y
CONFIG_LEDS_TRIGGER_HEARTBEAT=y
CONFIG_LEDS_TRIGGER_DEFAULT_ON=y
CONFIG_LEDS_TRIGGER_TIMER=y
CONFIG_LEDS_TRIGGER_ONESHOT=y
CONFIG_LEDS_TRIGGER_DISK=y
CONFIG_LEDS_TRIGGER_CPU=y

# Wireless stack — required by AIC8800DC WiFi driver
CONFIG_WIRELESS=y
CONFIG_CFG80211=m
CONFIG_MAC80211=m
CONFIG_RFKILL=y
CONFIG_RFKILL_RK=y
CONFIG_WL_ROCKCHIP=m

# Bluetooth stack — AIC8800DC exposes a combined WiFi/BT chip over
# SDIO+UART1. Enable the full core (BR/EDR + LE), the UART HCI
# transport hciattach binds to, and RFCOMM/BNEP/HIDP so BlueZ
# userspace can do the obvious things.
CONFIG_BT=y
CONFIG_BT_BREDR=y
CONFIG_BT_LE=y
CONFIG_BT_RFCOMM=y
CONFIG_BT_RFCOMM_TTY=y
CONFIG_BT_BNEP=y
CONFIG_BT_BNEP_MC_FILTER=y
CONFIG_BT_BNEP_PROTO_FILTER=y
CONFIG_BT_HIDP=y
CONFIG_BT_HCIUART=y
CONFIG_BT_HCIUART_SERDEV=y
CONFIG_BT_HCIUART_H4=y
CONFIG_BT_HCIUART_BCSP=y
CONFIG_BT_HCIUART_LL=y
CONFIG_CRYPTO_USER_API=y
CONFIG_CRYPTO_USER_API_HASH=y
CONFIG_CRYPTO_USER_API_SKCIPHER=y
CONFIG_CRC16=y

# Debug: allow devmem access and enable debugfs
CONFIG_STRICT_DEVMEM=n
CONFIG_DEBUG_FS=y
